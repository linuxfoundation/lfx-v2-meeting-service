---
name: Publish Container Branch

"on":
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    name: Publish Container
    if: ${{ github.event.pull_request.head.repo.fork == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v5
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v5
        with:
          go-version-file: go.mod
      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d  # v0.9
        with:
          version: v0.18.0
      - name: Prepare container tag
        id: container_tag
        env:
          HEAD_REF: "${{ github.head_ref }}"
        run: |
          container_tag=$(echo "$HEAD_REF" | sed 's/[^_0-9a-zA-Z]/-/g' | cut -c -127)
          echo tag="$container_tag" >> "$GITHUB_OUTPUT"
      - name: Build meeting-api for PR
        env:
          VERSION: ${{ steps.container_tag.outputs.tag }}
        run: |
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          GIT_COMMIT="${{ github.sha }}"
          GIT_COMMIT="${GIT_COMMIT:0:7}"
          export BUILD_TIME
          export GIT_COMMIT
          ko build github.com/linuxfoundation/lfx-v2-meeting-service/cmd/meeting-api \
            -B \
            --platform linux/amd64,linux/arm64 \
            -t ${{ github.sha }} \
            -t ${{ steps.container_tag.outputs.tag }} \
            --sbom spdx
