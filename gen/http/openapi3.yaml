        ZoomWebhookPayload:
            type: object
            properties:
                event:
                    type: string
                    description: The type of event
                    example: meeting.started
                    enum:
                        - meeting.started
                        - meeting.ended
                        - meeting.deleted
                        - meeting.participant_joined
                        - meeting.participant_left
                        - recording.completed
                        - recording.transcript_completed
                        - meeting.summary_completed
                        - endpoint.url_validation
                event_ts:
                    type: integer
                    description: Event timestamp in milliseconds
                    example: 1609459200000
                    format: int64
                payload:
                    description: Contains meeting, participant, or recording data depending on event type
                    example: Ab ab necessitatibus odit architecto.
                zoom_signature:
                    type: string
                    description: HMAC-SHA256 signature of the request body
                    example: Et alias eos dolores est tempora.
                zoom_timestamp:
                    type: string
                    description: Timestamp when the webhook was sent
                    example: Eaque nemo voluptatum.
            description: Zoom webhook event payload
            example:
                event: meeting.started
                event_ts: 1609459200000
                payload: Id totam assumenda.
                zoom_signature: Cumque expedita deleniti illo hic quidem.
                zoom_timestamp: Quia corrupti non vero neque.
            required:
                - event
                - event_ts
                - payload
                - zoom_signature
                - zoom_timestamp
        ZoomWebhookResponse:
            type: object
            properties:
                encryptedToken:
                    type: string
                    description: The HMAC SHA-256 hash of the plain token
                    example: b2e92a9dffc3c9116a64cfdccf0a0ffdcaa89e86affa09a26e008a2e0e9f92a0
                message:
                    type: string
                    description: Optional message
                    example: Event processed successfully
                plainToken:
                    type: string
                    description: The plain token received in the validation request
                    example: vLbBnxzIJx4L8xRndWdW2g
                status:
                    type: string
                    description: Processing status
                    example: success
            description: Response indicating successful webhook processing
            example:
                encryptedToken: b2e92a9dffc3c9116a64cfdccf0a0ffdcaa89e86affa09a26e008a2e0e9f92a0
                message: Event processed successfully
                plainToken: vLbBnxzIJx4L8xRndWdW2g
                status: success
    securitySchemes:
        jwt_header_Authorization:
            type: http
            description: Heimdall authorization
            scheme: bearer
