            type: object
            properties:
                allowed_voting_statuses:
                    type: array
                    items:
                        type: string
                        example: Modi non consequatur ad adipisci eius optio.
                    description: Allowed voting statuses for committee members
                    example:
                        - Et porro quibusdam facilis ipsa.
                        - Facere aliquam.
                uid:
                    type: string
                    description: Committee UID
                    example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                    format: uuid
            description: A committee associated with a meeting
            example:
                allowed_voting_statuses:
                    - Corrupti eligendi cum maxime.
                    - Voluptas consequatur voluptatem tempora.
                uid: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
        ConflictError:
            type: object
            properties:
                code:
                    type: string
                    description: HTTP status code
                    example: "409"
                message:
                    type: string
                    description: Error message
                    example: The resource already exists.
            example:
                code: "409"
                message: The resource already exists.
            required:
                - code
                - message
        CreateItxMeetingAttachmentPresignRequestBody:
            type: object
            properties:
                category:
                    type: string
                    description: Attachment category
                    example: Meeting Minutes
                    enum:
                        - Meeting Minutes
                        - Notes
                        - Presentation
                        - Other
                description:
                    type: string
                    description: Optional description
                    example: Aut assumenda aut.
                file_size:
                    type: integer
                    description: File size in bytes
                    example: 2668829008732751411
                    format: int64
                file_type:
                    type: string
                    description: MIME type
                    example: Minus nobis animi et voluptatem animi reiciendis.
                name:
                    type: string
                    description: File name
                    example: Praesentium magni facere rerum et.
            example:
                category: Notes
                description: Sunt laudantium sint corporis incidunt perferendis corrupti.
                file_size: 3946082903713987497
                file_type: Esse sunt beatae maxime dolores.
                name: Adipisci delectus totam sit veniam debitis.
            required:
                - name
                - file_size
                - file_type
        CreateItxMeetingAttachmentRequestBody:
            type: object
            properties:
                category:
                    type: string
                    description: Attachment category
                    example: Other
                    enum:
                        - Meeting Minutes
                        - Notes
                        - Presentation
                        - Other
                description:
                    type: string
                    description: Optional description
                    example: Quod est beatae.
                link:
                    type: string
                    description: External link URL (required if type is 'link')
