components:
    schemas:
        BadRequestError:
            type: object
            properties:
                code:
                    type: string
                    description: HTTP status code
                    example: "400"
                message:
                    type: string
                    description: Error message
                    example: The request was invalid.
            example:
                code: "400"
                message: The request was invalid.
            required:
                - code
                - message
        Committee:
            type: object
            properties:
                allowed_voting_statuses:
                    type: array
                    items:
                        type: string
                        example: Vel cum facere.
                    description: Allowed voting statuses for committee members
                    example:
                        - Voluptas et ut quis quia magni nihil.
                        - Quaerat est velit architecto.
                        - Placeat et.
                uid:
                    type: string
                    description: Committee UID
                    example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                    format: uuid
            description: A committee associated with a meeting
            example:
                allowed_voting_statuses:
                    - Ratione enim.
                    - Et tenetur amet molestiae.
                uid: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
        ConflictError:
            type: object
            properties:
                code:
                    type: string
                    description: HTTP status code
                    example: "409"
                message:
                    type: string
                    description: Error message
                    example: The resource already exists.
            example:
                code: "409"
                message: The resource already exists.
            required:
                - code
                - message
        CreateItxMeetingAttachmentPresignRequestBody:
            type: object
            properties:
                category:
                    type: string
                    description: Attachment category
                    example: Presentation
                    enum:
                        - Meeting Minutes
                        - Notes
                        - Presentation
                        - Other
                description:
                    type: string
                    description: Optional description
                    example: Accusantium qui voluptatem sunt recusandae quisquam voluptas.
                file_size:
                    type: integer
                    description: File size in bytes
                    example: 4134282070248989177
                    format: int64
                file_type:
                    type: string
                    description: MIME type
                    example: Voluptate tempora.
                name:
                    type: string
                    description: File name
                    example: Assumenda aut.
            example:
                category: Notes
                description: Ut quae quia quasi qui dolorum.
                file_size: 6626219575824847254
                file_type: Molestiae quas officiis placeat laboriosam et.
                name: Eveniet autem qui ut et ut voluptate.
            required:
                - name
                - file_size
                - file_type
        CreateItxMeetingAttachmentRequestBody:
            type: object
            properties:
                category:
                    type: string
                    description: Attachment category
                    example: Meeting Minutes
                    enum:
                        - Meeting Minutes
                        - Notes
                        - Presentation
                        - Other
                description:
                    type: string
                    description: Optional description
                    example: Eligendi velit ab.
                link:
                    type: string
                    description: External link URL (required if type is 'link')
                    example: Eum et hic.
                name:
                    type: string
                    description: Attachment name
                    example: a
                    minLength: 1
                type:
                    type: string
                    description: Attachment type
                    example: link
                    enum:
                        - file
                        - link
            example:
                category: Other
                description: Assumenda odit totam quia.
                link: Iusto dignissimos.
                name: xi0
                type: file
            required:
                - type
                - category
                - name
        CreateItxMeetingRequestBody:
            type: object
            properties:
                ai_summary_enabled:
                    type: boolean
                    description: Whether Zoom AI Companion summary is enabled for the meeting
                    example: false
                artifact_visibility:
                    type: string
                    description: The visibility of artifacts to users
                    example: public
                    enum:
                        - meeting_hosts
                        - meeting_participants
                        - public
                committees:
                    type: array
                    items:
                        $ref: '#/components/schemas/Committee'
                    description: The committees associated with the meeting
                    example:
