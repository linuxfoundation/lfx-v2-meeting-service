definitions:
    BadRequestError:
        title: BadRequestError
        type: object
        properties:
            code:
                type: string
                description: HTTP status code
                example: "400"
            message:
                type: string
                description: Error message
                example: The request was invalid.
        description: Bad request
        example:
            code: "400"
            message: The request was invalid.
        required:
            - code
            - message
    Committee:
        title: Committee
        type: object
        properties:
            allowed_voting_statuses:
                type: array
                items:
                    type: string
                    example: Doloribus laboriosam numquam ut.
                description: Allowed voting statuses for committee members
                example:
                    - Quo dicta.
                    - Aut aut illo et aut mollitia qui.
            uid:
                type: string
                description: Committee UID
                example: 7cad5a8d-19d0-41a4-81a6-043453daf9ee
                format: uuid
        description: A committee associated with a meeting
        example:
            allowed_voting_statuses:
                - Et debitis voluptates iste accusamus.
                - Est in non omnis ad dolor et.
                - Aperiam quo quia iure molestiae voluptates perferendis.
                - Consequuntur iure.
