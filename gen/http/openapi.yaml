        description: Zoom-specific configuration for a past meeting summary
        example:
            meeting_id: "12343245463"
            meeting_uuid: aDYlohsHRtCd4ii1uC2+hA==
    Recurrence:
        title: Recurrence
        type: object
        properties:
            end_date_time:
                type: string
                description: End date/time in RFC3339
                example: "1998-04-21T19:26:44Z"
                format: date-time
            end_times:
                type: integer
                description: Number of occurrences
                example: 1168343020814975878
                format: int64
            monthly_day:
                type: integer
                description: Day of month for monthly recurrence
                example: 4117682023316224808
                format: int64
            monthly_week:
                type: integer
                description: Week of month for monthly recurrence
                example: 1676617448085215546
                format: int64
            monthly_week_day:
                type: integer
                description: Day of week for monthly recurrence
                example: 3459421737005219264
                format: int64
            repeat_interval:
                type: integer
                description: Repeat interval
                example: 3125667330802401900
                format: int64
            type:
                type: integer
                description: 'Recurrence type: 1=Daily, 2=Weekly, 3=Monthly'
                example: 2
                enum:
                    - 1
                    - 2
                    - 3
                format: int64
            weekly_days:
                type: string
                description: Days of week for weekly recurrence
                example: Aperiam mollitia ex ut.
        description: Meeting recurrence settings
        example:
            end_date_time: "1983-03-24T12:36:18Z"
            end_times: 3640062663559338362
            monthly_day: 974613191608508737
            monthly_week: 4299451601439384591
            monthly_week_day: 8658432912483156729
            repeat_interval: 5068540254656051237
            type: 2
            weekly_days: Voluptatem ipsam omnis officiis officiis qui.
    ServiceUnavailableError:
        title: ServiceUnavailableError
        type: object
        properties:
            code:
                type: string
                description: HTTP status code
                example: "503"
            message:
                type: string
                description: Error message
                example: The service is unavailable.
        description: Service unavailable
        example:
            code: "503"
            message: The service is unavailable.
        required:
            - code
            - message
    SummaryData:
        title: SummaryData
        type: object
        properties:
            content:
                type: string
                description: The main AI-generated summary content
                example: This meeting discussed sprint progress, addressed blockers, and outlined next steps for the team.
            doc_url:
                type: string
                description: URL to the full summary document
                example: https://zoom.us/rec/summary/abc123
            edited_content:
                type: string
                description: User-edited summary content
                example: Updated meeting summary with additional details and action items.
            end_time:
                type: string
                description: Summary end time
                example: "2024-01-15T11:00:00Z"
                format: date-time
            start_time:
                type: string
                description: Summary start time
                example: "2024-01-15T10:00:00Z"
                format: date-time
            title:
                type: string
                description: Summary title
                example: Weekly Team Standup Meeting
        description: AI-generated summary content for a past meeting
        example:
            content: This meeting discussed sprint progress, addressed blockers, and outlined next steps for the team.
            doc_url: https://zoom.us/rec/summary/abc123
            edited_content: Updated meeting summary with additional details and action items.
            end_time: "2024-01-15T11:00:00Z"
            start_time: "2024-01-15T10:00:00Z"
            title: Weekly Team Standup Meeting
        required:
            - start_time
            - end_time
    UnauthorizedError:
        title: UnauthorizedError
        type: object
        properties:
            code:
